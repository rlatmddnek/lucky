        #root {

            font-size: 1.1rem;

        .header-ornament {

            padding: 0.8rem;

        .year-input { flex: 2; }
        .select-input { flex: 1; cursor: pointer; }
        .full-select { width: 100%; }
        
        /* Calendar Type Toggle */
        .calendar-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 4px;
            margin-bottom: 1rem;
        }
        .toggle-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: none;
            color: #aaa;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: var(--color-gold);
            color: var(--color-ink-black);
            font-weight: 700;
        }

        .submit-button {
            background: var(--color-crimson);
            color: var(--color-gold);
            border: 1px solid var(--color-gold);
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .submit-button:hover {
            background: var(--color-gold);
            color: var(--color-crimson);
        }

            padding: 2rem 1rem;
            text-align: center;

        .zodiac-grid-title {

            font-size: 1.5rem;

        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;

        .zodiac-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);

                fortune: '계획했던 일들이 착착 진행되는 날입니다. 성실함이 최고의 무기가 됩니다.', 
                advice: '정확한 시간을 지키고 약속을 이행하는 자세가 중요합니다.', 
                luckyColor: '은색', luckyNumber: 10, luckyDirection: '서쪽',
                yearFortunes: [
                    { year: '05년생', text: '성실한 태도가 좋은 평가를 이끌어냅니다.' },
                    { year: '93년생', text: '꼼꼼한 성격이 빛을 발합니다. 실수를 줄이세요.' },
                    { year: '81년생', text: '정직한 행동이 신뢰를 쌓는 밑거름이 됩니다.' },
                    { year: '69년생', text: '가정에 평화가 찾아옵니다. 가족과 대화하세요.' }
                ]
            },
            { 
                id: 'dog', name: '개띠', hanja: '戌', zodiac: '술', 
                fortune: '충실한 노력에 대한 보상이 따르는 날입니다. 신뢰를 얻어 일이 잘 풀립니다.', 
                advice: '의리를 지키는 모습이 주변 사람들에게 깊은 인상을 줄 것입니다.', 
                luckyColor: '갈색', luckyNumber: 5, luckyDirection: '서북쪽',
                yearFortunes: [
                    { year: '06년생', text: '믿음직한 모습이 주변에 안도감을 줍니다.' },
                    { year: '94년생', text: '작은 일에도 최선을 다하면 큰 행운이 옵니다.' },
                    { year: '82년생', text: '의리를 중요하게 생각하세요. 사람을 얻습니다.' },
                    { year: '70년생', text: '오해는 대화로 풀어야 합니다. 먼저 다가가세요.' }
                ]
            },
            { 
                id: 'pig', name: '돼지띠', hanja: '亥', zodiac: '해', 
                fortune: '재물운이 상승하는 기분 좋은 하루입니다. 풍요로운 마음으로 지낼 수 있습니다.', 
                advice: '베푸는 기쁨을 느껴보세요. 나중에 더 큰 복으로 돌아올 것입니다.', 
                luckyColor: '검정색', luckyNumber: 6, luckyDirection: '북서쪽',
                yearFortunes: [
                    { year: '07년생', text: '기분 좋은 일이 생기는 활기찬 날입니다.' },
                    { year: '95년생', text: '횡재수가 있을 수 있으니 주변을 잘 살펴보세요.' },
                    { year: '83년생', text: '너그러운 마음이 대인관계를 원만하게 합니다.' },
                    { year: '71년생', text: '여유로운 마음으로 하루를 즐겨보세요.' }
                ]
            },
        ];

        // --- Components ---

        const Header = () => (
            <header className="header-section">
                <div className="header-ornament"></div>
                <h1 className="header-title">운수대통 (運數大通)</h1>
                <p className="header-subtitle">오늘의 운세를 확인하고 행운을 잡으세요</p>
                <div className="header-ornament"></div>
            </header>
        );

        const BirthInput = ({ onCalculate }) => {
            const [calendarType, setCalendarType] = useState('solar'); // 'solar' or 'lunar'
            const [year, setYear] = useState('');
            const [month, setMonth] = useState('1');
            const [day, setDay] = useState('1');
            const [time, setTime] = useState('unknown');

            const getDaysInMonth = (y, m) => new Date(y, m, 0).getDate();
            const daysInMonth = useMemo(() => getDaysInMonth(Number(year) || 2026, Number(month)), [year, month]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!year) return alert('연도를 입력해주세요.');
                onCalculate(Number(year), Number(month), Number(day), time, calendarType);
            };

            return (
                <section className="birth-container">
                    <h2 className="birth-title">사주 정보를 입력하세요</h2>
                    <form onSubmit={handleSubmit} className="birth-form">
                        <div className="calendar-toggle">
                            <button 
                                type="button" 
                                className={`toggle-btn ${calendarType === 'solar' ? 'active' : ''}`}
                                onClick={() => setCalendarType('solar')}
                            >
                                양력
                            </button>
                            <button 
                                type="button" 
                                className={`toggle-btn ${calendarType === 'lunar' ? 'active' : ''}`}
                                onClick={() => setCalendarType('lunar')}
                            >
                                음력
                            </button>
                        </div>

                        <div className="input-group">
                            <label className="input-label"><Calendar size={18} /> {calendarType === 'solar' ? '양력' : '음력'} 생년월일</label>
                            <div className="date-inputs">
                                <input type="number" placeholder="YYYY" value={year} onChange={e => setYear(e.target.value)} className="input-field year-input" />
                                <select value={month} onChange={e => setMonth(e.target.value)} className="input-field select-input">
                                    {Array.from({length:12}, (_, i) => i+1).map(m => <option key={m} value={m}>{m}월</option>)}
                                </select>
                                <select value={day} onChange={e => setDay(e.target.value)} className="input-field select-input">
                                    {Array.from({length:daysInMonth}, (_, i) => i+1).map(d => <option key={d} value={d}>{d}일</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="input-group">
                            <label className="input-label"><Clock size={18} /> 태어난 시간</label>
                            <select value={time} onChange={e => setTime(e.target.value)} className="input-field full-select">
                                <option value="unknown">모름</option>
                                <option value="0">자시 (23:30 ~ 01:29)</option>
                                <option value="1">축시 (01:30 ~ 03:29)</option>
                                <option value="2">인시 (03:30 ~ 05:29)</option>
                                <option value="3">묘시 (05:30 ~ 07:29)</option>
                                <option value="4">진시 (07:30 ~ 09:29)</option>
                                <option value="5">사시 (09:30 ~ 11:29)</option>
                                <option value="6">오시 (11:30 ~ 13:29)</option>
                                <option value="7">미시 (13:30 ~ 15:29)</option>
                                <option value="8">신시 (15:30 ~ 17:29)</option>
                                <option value="9">유시 (17:30 ~ 19:29)</option>
                                <option value="10">술시 (19:30 ~ 21:29)</option>
                                <option value="11">해시 (21:30 ~ 23:29)</option>
                            </select>
                        </div>
                        <button type="submit" className="submit-button">운세 결과 보기</button>
                    </form>
                </section>
            );
        };

        const ZodiacGrid = ({ onSelect, selectedId }) => (
            <div className="zodiac-grid-container">
                <h2 className="zodiac-grid-title">또는 띠를 직접 선택하세요</h2>
                <div className="zodiac-grid">
                    {zodiacData.map(item => (
                        <button 
                            key={item.id} 
                            className={`zodiac-button ${selectedId === item.id ? 'selected' : ''}`}
                            onClick={() => onSelect(item.id)}
                        >
                            <span className="zodiac-hanja">{item.hanja}</span>
                            <span className="zodiac-name">{item.name}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        const LottoGenerator = ({ seedId }) => {
            const [numbers, setNumbers] = useState([]);
            const [spinning, setSpinning] = useState(false);

            const generate = () => {
                setSpinning(true);
                setTimeout(() => {
                    const res = [];
                    while(res.length < 6) {
                        const n = Math.floor(Math.random() * 45) + 1;
                        if(!res.includes(n)) res.push(n);
                    }
                    setNumbers(res.sort((a,b) => a-b));
                    setSpinning(false);
                }, 800);
            };

            useEffect(generate, [seedId]);

            return (
                <div className="lotto-container">
                    <div className="lotto-title"><Sparkles size={20} /> <h3>오늘의 행운 번호</h3></div>
                    <div className="lotto-numbers">
                        {numbers.map((n, i) => (
                            <div key={i} className={`lotto-ball ball-${Math.floor((n-1)/10)}`}>{n}</div>
                        ))}
                    </div>
                    <button className="refresh-btn" onClick={generate} disabled={spinning}>
                        <RefreshCw size={16} className={spinning ? 'spinning' : ''} /> 다른 기운 받기
                    </button>
                </div>
            );
        };

        const FortuneCard = ({ fortune }) => {
            if(!fortune) return null;
            return (
                <div id="fortune-result" className="card-wrapper">
                    <div className="fortune-card">
                        <div className="card-hanja">{fortune.hanja}</div>
                        <h2 className="card-name">{fortune.name}의 오늘의 운세</h2>
                        <p className="main-fortune">{fortune.fortune}</p>
                        <div className="advice-box">
                            <Quote size={20} color="#8b0000" />
                            <p>{fortune.advice}</p>
                        </div>
                        <div className="lucky-elements">
                            <div className="lucky-item"><Palette size={24} /> <span className="lucky-label">행운의 색상</span><span className="lucky-value">{fortune.luckyColor}</span></div>
                            <div className="lucky-item"><Hash size={24} /> <span className="lucky-label">행운의 숫자</span><span className="lucky-value">{fortune.luckyNumber}</span></div>
                            <div className="lucky-item"><Compass size={24} /> <span className="lucky-label">행운의 방위</span><span className="lucky-value">{fortune.luckyDirection}</span></div>
                        </div>

                        {fortune.yearFortunes && (
                            <div className="year-fortunes">
                                <h3 className="year-fortune-title">연생별 짧은 운세</h3>
                                <div className="year-fortune-grid">
                                    {fortune.yearFortunes.map((yf, idx) => (
                                        <div key={idx} className="year-item">
                                            <span className="year-label">{yf.year}</span>
                                            <p className="year-text">{yf.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <LottoGenerator seedId={fortune.id} />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedFortune, setSelectedFortune] = useState(null);

            const calculateZodiac = (year) => {
                const map = { 0:'monkey', 1:'rooster', 2:'dog', 3:'pig', 4:'rat', 5:'ox', 6:'tiger', 7:'rabbit', 8:'dragon', 9:'snake', 10:'horse', 11:'sheep' };
                return map[year % 12];
            };

            const handleBirth = (y) => {
                const id = calculateZodiac(y);
                const fortune = zodiacData.find(d => d.id === id);
                setSelectedFortune(fortune);
                setTimeout(() => document.getElementById('fortune-result')?.scrollIntoView({ behavior: 'smooth' }), 100);
            };

            return (
                <>
                    <Header />
                    <main style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', paddingBottom: '5rem' }}>
                        <BirthInput onCalculate={handleBirth} />
                        <ZodiacGrid onSelect={id => setSelectedFortune(zodiacData.find(d => d.id === id))} selectedId={selectedFortune?.id} />
                        <FortuneCard fortune={selectedFortune} />
                    </main>
                    <footer style={{ padding: '4rem 1rem 2rem', color: '#666', fontSize: '0.9rem', textAlign: 'center', background: 'rgba(0,0,0,0.3)', width: '100%' }}>
                        <p>© 2026 운수대통. 모든 권리는 보호받습니다.</p>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
