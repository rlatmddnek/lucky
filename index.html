<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>운수대통</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet"><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><script src="https://unpkg.com/lucide-react@0.473.0/dist/umd/lucide-react.min.js"></script><style>:root{--gold:#d4af37;--crimson:#8b0000;--dark:#1a1a1a;--paper:#f9f4e8}*{margin:0;padding:0;box-sizing:border-box}body{background-color:var(--dark);color:#eee;font-family:'Noto Serif KR',serif;min-height:100vh}body.mood-mode{background:#f0f9ff;color:#334155}.nav{position:sticky;top:0;background:rgba(26,26,26,.95);display:flex;justify-content:center;gap:1rem;padding:1rem;border-bottom:1px solid rgba(212,175,55,.3);z-index:1000}.nav-item{color:#aaa;padding:.5rem 1rem;border-radius:20px;cursor:pointer;font-size:.9rem}.nav-item.active{color:var(--gold);background:rgba(212,175,55,.1)}.card{background:var(--paper);border:4px double var(--gold);padding:2rem;color:var(--dark);text-align:center;width:100%;max-width:600px;margin-top:2rem}.box{width:100%;max-width:600px;padding:1.5rem;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(212,175,55,.3);margin-bottom:2rem;text-align:center}.input{background:var(--dark);border:1px solid #444;color:#white;padding:.8rem;border-radius:4px;width:100%}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;width:100%;max-width:600px}.btn{background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.2);padding:1rem .5rem;border-radius:8px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:.5rem}.btn.sel{background:var(--crimson);border-color:var(--gold)}.toggle{display:flex;background:rgba(255,255,255,.1);border-radius:6px;padding:4px;margin-bottom:1rem}.t-btn{flex:1;padding:.4rem;color:#aaa;font-size:.8rem;border-radius:4px;cursor:pointer}.t-btn.active{background:var(--gold);color:var(--dark);font-weight:700}.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}.chip{background:rgba(255,255,255,.6);padding:1rem .5rem;border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:.5rem;cursor:pointer}.chip.sel{background:#fff;border:2px solid currentColor}</style></head><body><div id="root"></div><script type="text/babel">const {useState,useEffect,useMemo}=React;const Icons=window.LucideReact||{};const {Sparkles=()=>null,Quote=()=>null,Utensils=()=>null,Search=()=>null,RefreshCw=()=>null}=Icons;const zodiacs=[{id:'rat',name:'쥐띠',emoji:'🐭',f:'기쁜 하루입니다.',a:'배려하세요.',m:['파란 펜 쓰기']},{id:'ox',name:'소띠',emoji:'🐮',f:'결실을 맺습니다.',a:'서두르지 마세요.',m:['물 마시기']},{id:'tiger',name:'호랑이띠',emoji:'🐯',f:'새로운 도전!',a:'자신감을!',m:['기지개 켜기']},{id:'rabbit',name:'토끼띠',emoji:'🐰',f:'평온한 하루.',a:'따뜻하게.',m:['칭찬하기']},{id:'dragon',name:'용띠',emoji:'🐲',f:'에너지 뿜뿜!',a:'욕심 조절.',m:['계단 걷기']},{id:'snake',name:'뱀띠',emoji:'🐍',f:'직관이 예리함.',a:'분석하세요.',m:['정리정돈']},{id:'horse',name:'말띠',emoji:'🐴',f:'활동적인 날.',a:'휴식 필요.',m:['환기하기']},{id:'sheep',name:'양띠',emoji:'🐑',f:'대화가 술술.',a:'양보하세요.',m:['안부 묻기']},{id:'monkey',name:'원숭이띠',emoji:'🐵',f:'즐거운 하루.',a:'진중하게.',m:['농담 하기']},{id:'rooster',name:'닭띠',emoji:'🐔',f:'순조로운 날.',a:'신뢰 유지.',m:['일찍 가기']},{id:'dog',name:'개띠',emoji:'🐶',f:'보람찬 하루.',a:'의리 지킴.',m:['신발 정리']},{id:'pig',name:'돼지띠',emoji:'🐷',f:'풍요로운 날.',a:'베푸세요.',m:['동전 저금']}];const foods={'happy':[{f:'스테이크',r:'행복한 식사!'}],'excited':[{f:'치킨',r:'신나는 기분!'}],'tired':[{f:'삼계탕',r:'보양식 추천'}],'sad':[{f:'떡볶이',r:'매운맛 위로'}],'default':[{f:'비빔밥',r:'든든한 한 끼'}]};const App=()=>{const [p,setP]=useState('f');const [s,setS]=useState(null);const [c,setC]=useState('s');const [w,setW]=useState({city:'서울',cond:'Clear',temp:'20'});useEffect(()=>{if(p==='m'){document.body.classList.add('mood-mode');fetch('https://wttr.in/?format=j1').then(r=>r.json()).then(d=>setW({city:d.nearest_area[0].areaName[0].value,cond:d.current_condition[0].weatherDesc[0].value,temp:d.current_condition[0].temp_C})).catch(()=>{});}else document.body.classList.remove('mood-mode')},[p]);const calc=(y)=>zodiacs[Number(y)%12===4?0:(Number(y)%12===5?1:0)];const getZ=(y)=>{const map={0:'monkey',1:'rooster',2:'dog',3:'pig',4:'rat',5:'ox',6:'tiger',7:'rabbit',8:'dragon',9:'snake',10:'horse',11:'sheep'};return zodiacs.find(d=>d.id===map[Number(y)%12]);};return(<><nav className="nav"><div className={`nav-item ${p==='f'?'active':''}`} onClick={()=>setP('f')}>운수대통</div><div className={`nav-item ${p==='m'?'active':''}`} onClick={()=>setP('m')}>오늘은 이거지</div><div className={`nav-item ${p==='c'?'active':''}`} onClick={()=>setP('c')}>포춘쿠키</div></nav><main style={{width:'100%',display:'flex',flexDirection:'column',alignItems:'center',padding:'2rem 1rem'}}>{p==='f'&&(<> <div className="box"><h2>사주 정보 (음력/양력)</h2><div className="toggle"><div className={`t-btn ${c==='s'?'active':''}`} onClick={()=>setC('s')}>양력</div><div className={`t-btn ${c==='l'?'active':''}`} onClick={()=>setC('l')}>음력</div></div><input type="number" placeholder="YYYY" id="by" className="input" style={{color:'#000'}}/><button className="submit-button" style={{width:'100%',background:'#8b0000',color:'#d4af37',padding:'1rem',marginTop:'1rem',borderRadius:'4px'}} onClick={()=>{const y=document.getElementById('by').value;if(y)setS(getZ(y))}}>운세 보기</button></div><div className="grid">{zodiacs.map(z=>(<button key={z.id} className={`btn ${s?.id===z.id?'sel':''}`} onClick={()=>setS(z)}><span style={{fontSize:'2rem'}}>{z.emoji}</span><span style={{fontSize:'.8rem'}}>{z.name}</span></button>))}</div>{s&&<div className="card"><div style={{fontSize:'4rem'}}>{s.emoji}</div><h2>{s.name} 운세</h2><p style={{fontSize:'1.2rem',margin:'1rem 0'}}>{s.f}</p><div className="mission-box"><div style={{fontWeight:700,color:'#8b0000'}}><Sparkles size={16}/> 행운 미션</div><p>{s.m[0]}</p></div><p style={{opacity:.8}}>{s.a}</p></div></>)}{p==='m'&&<MoodView w={w}/>}{p==='c'&&<CookieView/>}</main><footer style={{padding:'2rem',color:'#666'}}>© 2026 운수대통</footer></>)};const MoodView=({w})=>{const [sl,setSl]=useState(null);const [rc,setRc]=useState(null);const list=[{id:'happy',i:'😊',l:'행복',c:'#f59e0b'},{id:'excited',i:'🎉',l:'신남',c:'#ef4444'},{id:'tired',i:'😴',l:'피곤',c:'#64748b'},{id:'sad',i:'😢',l:'슬픔',c:'#3b82f6'}];return(<div className="box" style={{background:'rgba(255,255,255,.1)',color:'#333'}}><h1 style={{marginBottom:'1rem'}}>오늘은 이거지</h1><p>{w.city} | {w.cond}, {w.temp}°C</p><div className="mood-grid" style={{marginTop:'1.5rem'}}>{list.map(m=>(<div key={m.id} className={`chip ${sl===m.id?'sel':''}`} onClick={()=>{setSl(m.id);setRc((foods[m.id]||foods['default'])[0])}} style={{color:m.c}}><span>{m.i}</span><strong>{m.l}</strong></div>))}</div>{rc&&<div className="recommend-box"><h3>추천: {rc.f}</h3><p>{rc.r}</p><a href={`https://map.naver.com/v5/search/${encodeURIComponent(rc.f)}`} target="_blank" className="store-search-btn">맛집 찾기</a></div>}</div>)};const CookieView=()=>{const [o,setO]=useState(false);const msgs=["행운이 옵니다.","당신은 최고!","힘내세요.","곧 기쁜 소식이!"];const m=useMemo(()=>msgs[Math.floor(Math.random()*msgs.length)],[o]);return(<div style={{textAlign:'center',padding:'3rem'}}><h1 style={{color: '#d4af37'}}>포춘 쿠키</h1><div onClick={()=>setO(true)} style={{fontSize:'8rem',cursor:'pointer',margin:'2rem'}}>{!o?'🥠':<div style={{background:'#fff',padding:'2rem',borderRadius:'8px',fontSize:'1.2rem',color:'#000'}}>{m}</div>}</div>{o&&<button onClick={()=>setO(false)} style={{color:'#d4af37',border:'1px solid #d4af37',padding:'.5rem 1rem',borderRadius:'20px'}}>다시 하기</button>}</div>)};ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script></body></html>
