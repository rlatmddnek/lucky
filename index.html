                        <div className="date-inputs">
                            <input type="number" placeholder="YYYY" value={year} onChange={e => setYear(e.target.value)} className="input-field year-input" />
                            <select value={month} onChange={e => setMonth(e.target.value)} className="input-field select-input">
                                {Array.from({length:12}, (_, i) => i+1).map(m => <option key={m} value={m}>{m}월</option>)}
                            </select>
                            <select value={day} onChange={e => setDay(e.target.value)} className="input-field select-input">
                                {Array.from({length:31}, (_, i) => i+1).map(d => <option key={d} value={d}>{d}일</option>)}
                            </select>
                        </div>
                        <button type="submit" className="submit-button">운세 결과 보기</button>
                    </form>
                </section>
            );
        };

        const ZodiacGrid = ({ onSelect, selectedId }) => (
            <div className="zodiac-grid-container">
                <h2 style={{ color: '#d4af37', marginBottom: '2rem', fontSize: '1.5rem' }}>또는 띠를 직접 선택하세요</h2>
                <div className="zodiac-grid">
                    {zodiacData.map(item => (
                        <button key={item.id} className={`zodiac-button ${selectedId === item.id ? 'selected' : ''}`} onClick={() => onSelect(item.id)}>
                            <span className="zodiac-emoji">{item.emoji}</span>
                            <span className="zodiac-name">{item.name}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        const FortuneCard = ({ fortune }) => {
            if(!fortune) return null;
            const mission = useMemo(() => fortune.luckyMissions[Math.floor(Math.random() * fortune.luckyMissions.length)], [fortune.id]);
            return (
                <div id="fortune-result" className="card-wrapper">
                    <div className="fortune-card">
                        <div className="card-emoji">{fortune.emoji}</div>
                        <h2 className="card-name">{fortune.name}의 오늘의 운세</h2>
                        <p className="main-fortune">{fortune.fortune}</p>
                        <div className="mission-box">
                            <div className="mission-title"><Sparkles size={18} /> 오늘의 행운 미션</div>
                            <p className="mission-text">{mission}</p>
                            <p className="mission-note">* 미션을 완료하면 행운이 더 커집니다!</p>
                        </div>
                        <div className="advice-box"><Quote size={20} color="#8b0000" /><p>{fortune.advice}</p></div>
                        <div className="lucky-elements">
                            <div className="lucky-item"><Palette size={20} /><span className="lucky-label">색상</span><span className="lucky-value">{fortune.luckyColor}</span></div>
                            <div className="lucky-item"><Hash size={20} /><span className="lucky-label">숫자</span><span className="lucky-value">{fortune.luckyNumber}</span></div>
                            <div className="lucky-item"><Compass size={20} /><span className="lucky-label">방위</span><span className="lucky-value">{fortune.luckyDirection}</span></div>
                        </div>
                    </div>
                </div>
            );
        };

        const FortuneCookie = () => {
            const [isOpen, setIsOpen] = useState(false);
            const message = useMemo(() => fortuneCookieMessages[Math.floor(Math.random() * fortuneCookieMessages.length)], [isOpen]);
            return (
                <div style={{ padding: '3rem 1rem', textAlign: 'center' }}>
                    <h2 style={{ color: '#d4af37', fontSize: '2rem', marginBottom: '1rem' }}>포춘 쿠키를 열어보세요</h2>
                    <div onClick={() => setIsOpen(true)} style={{ fontSize: '8rem', cursor: 'pointer', margin: '2rem 0', userSelect: 'none' }}>
                        {!isOpen ? '🥠' : (
                            <div style={{ background: '#fff', padding: '2rem', borderRadius: '8px', fontSize: '1.2rem', color: '#1a1a1a', maxWidth: '300px', margin: '0 auto', borderLeft: '5px solid #8b0000', fontWeight: 700 }}>
                                {message}
                            </div>
                        )}
                    </div>
                    {isOpen && <button onClick={() => setIsOpen(false)} className="refresh-btn"><RefreshCw size={14} /> 다시 하기</button>}
                </div>
            );
        };

        const MoodTracker = () => {
            const [selectedId, setSelectedId] = useState(null);
            const [recommendation, setRecommendation] = useState(null);
            const moodsList = [
                { id: 'happy', icon: <Smile />, label: '행복', color: '#f59e0b' },
                { id: 'excited', icon: <Star />, label: '신남', color: '#ef4444' },
                { id: 'tired', icon: <Moon />, label: '피곤', color: '#64748b' },
                { id: 'sad', icon: <Frown />, label: '슬픔', color: '#3b82f6' },
                { id: 'peaceful', icon: <Heart />, label: '평온', color: '#10b981' },
                { id: 'thinking', icon: <Brain />, label: '고민', color: '#8b5cf6' }
            ];
            const handleMoodClick = (id) => {
                setSelectedId(id);
                const moodRecommends = foodMap[id] || foodMap['default'];
                const options = moodRecommends['default'];
                setRecommendation(options[Math.floor(Math.random() * options.length)]);
            };
            return (
                <div className="mood-container">
                    <h2 className="mood-title">오늘의 기분은 어떠신가요?</h2>
                    <div className="mood-selector">
                        {moodsList.map(m => (
                            <div key={m.id} className={`mood-chip ${selectedId === m.id ? 'selected' : ''}`} onClick={() => handleMoodClick(m.id)} style={{ color: m.color }}>
                                {m.icon}
                                <span style={{ fontSize: '0.8rem', fontWeight: 700 }}>{m.label}</span>
                            </div>
                        ))}
                    </div>
                    {recommendation && (
                        <div className="recommendation-box">
                            <div style={{ color: '#d4af37', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem' }}><Utensils size={18} /> 추천 메뉴</div>
                            <div className="recommend-food">{recommendation.food}</div>
                            <div style={{ color: '#ccc', fontSize: '0.9rem', padding: '0 1rem' }}>{recommendation.reason}</div>
                            <div style={{ paddingBottom: '1rem' }}>
                                <a href={`https://map.naver.com/v5/search/${encodeURIComponent(recommendation.food)}`} target="_blank" className="store-search-btn"><Search size={14} /> 맛집 찾기</a>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('fortune');
            const [selected, setSelected] = useState(null);
            useEffect(() => {
                if(page === 'mood') document.body.classList.add('mood-mode');
                else document.body.classList.remove('mood-mode');
            }, [page]);
            const calculateZodiac = (y) => {
                const map = { 0:'monkey', 1:'rooster', 2:'dog', 3:'pig', 4:'rat', 5:'ox', 6:'tiger', 7:'rabbit', 8:'dragon', 9:'snake', 10:'horse', 11:'sheep' };
                return map[Number(y) % 12];
            };
            return (
                <>
                    <nav className="nav-bar">
                        <div className={`nav-item ${page === 'fortune' ? 'active' : ''}`} onClick={() => setPage('fortune')}>운수대통</div>
                        <div className={`nav-item ${page === 'mood' ? 'active' : ''}`} onClick={() => setPage('mood')}>오늘은 이거지</div>
                        <div className={`nav-item ${page === 'cookie' ? 'active' : ''}`} onClick={() => setPage('cookie')}>포춘쿠키</div>
                    </nav>
                    <main style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', paddingBottom: '5rem' }}>
                        {page === 'fortune' && (
                            <>
                                <Header />
                                <BirthInput onCalculate={(y) => setSelected(zodiacData.find(d => d.id === calculateZodiac(y)))} />
                                <ZodiacGrid onSelect={id => setSelected(zodiacData.find(d => d.id === id))} selectedId={selected?.id} />
                                <FortuneCard fortune={selected} />
                            </>
                        )}
                        {page === 'mood' && <MoodTracker />}
                        {page === 'cookie' && <FortuneCookie />}
                    </main>
                    <footer style={{ padding: '2rem', color: '#666', textAlign: 'center', background: 'rgba(0,0,0,0.2)', width: '100%' }}>© 2026 운수대통</footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
