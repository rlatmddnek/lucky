<!DOCTYPE html>
<html lang="ko">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <!-- React & Babel CDN -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --color-gold: #d4af37;
            --color-gold-dark: #aa841e;
            --color-crimson: #8b0000;
            --color-ink-black: #1a1a1a;
            --color-paper: #f9f4e8;
            --color-text: #333333;
            --font-main: 'Noto Serif KR', serif;
            --shadow-traditional: 0 4px 15px rgba(0, 0, 0, 0.2);
            --border-traditional: 2px solid var(--color-gold);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-ink-black);
            color: var(--color-text);
            font-family: var(--font-main);
            line-height: 1.6;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
            transition: background 0.5s ease;
        }

        /* Refreshing Mood Background */
        body.mood-mode {
            background-color: #f0f9ff;
            background-image: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 50%, #fefce8 100%);
            color: #334155;
        }

        body.mood-mode .header-title { color: #0f172a; text-shadow: none; }
        body.mood-mode .header-subtitle { color: #64748b; }
        body.mood-mode .nav-bar { background: rgba(255, 255, 255, 0.8); border-bottom: 1px solid rgba(15, 23, 42, 0.1); }
        body.mood-mode .nav-item { color: #64748b; }
        body.mood-mode .nav-item.active { color: #0f172a; background: rgba(15, 23, 42, 0.05); }
        body.mood-mode .mood-container { background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: rgba(15, 23, 42, 0.1); }
        body.mood-mode .mood-title { color: #0f172a; }
        body.mood-mode .mood-note-area { background: #f8fafc; color: #0f172a; border-color: #e2e8f0; }
        body.mood-mode .recommend-context { background: #f1f5f9; color: #475569; }

        #root {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            cursor: pointer;
            font-family: inherit;
        }

        /* Navigation Styles */
        .nav-bar {
            position: sticky;
            top: 0;
            width: 100%;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 1000;
        }
        .nav-item {
            color: #aaa;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--color-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        /* Header Styles */
        .header-section {
            padding: 3rem 1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }
        .header-title {
            color: var(--color-gold);
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .header-subtitle {
            color: #ccc;
            font-size: 1.1rem;
            letter-spacing: 0.1rem;
        }
        .header-ornament {
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
        }

        /* BirthInput Styles */
        .birth-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-bottom: 2rem;
        }
        .birth-title {
            color: var(--color-gold);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }
        .birth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .input-label {
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .date-inputs {
            display: flex;
            gap: 0.5rem;
        }
        .input-field {
            background: var(--color-ink-black);
            border: 1px solid #444;
            color: white;
            padding: 0.8rem;
            border-radius: 4px;
        }
        .year-input { flex: 2; }
        .select-input { flex: 1; cursor: pointer; }
        .full-select { width: 100%; }
        
        /* Calendar Type Toggle */
        .calendar-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 4px;
            margin-bottom: 1rem;
        }
        .toggle-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: none;
            color: #aaa;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: var(--color-gold);
            color: var(--color-ink-black);
            font-weight: 700;
        }

        .submit-button {
            background: var(--color-crimson);
            color: var(--color-gold);
            border: 1px solid var(--color-gold);
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .submit-button:hover {
            background: var(--color-gold);
            color: var(--color-crimson);
        }

        /* ZodiacGrid Styles */
        .zodiac-grid-container {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1rem;
            text-align: center;
        }
        .zodiac-grid-title {
            color: var(--color-gold);
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        .zodiac-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1.5rem 0.5rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            color: white;
        }
        .zodiac-button:hover {
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-5px);
            border-color: var(--color-gold);
        }
        .zodiac-button.selected {
            background: var(--color-crimson);
            border-color: var(--color-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .zodiac-emoji {
            font-size: 2.5rem;
            line-height: 1;
        }
        .zodiac-name {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* FortuneCard Styles */
        .card-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1rem;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fortune-card {
            background-color: var(--color-paper);
            border: 4px double var(--color-gold);
            padding: 3rem 2rem;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            color: var(--color-ink-black);
            text-align: center;
        }
        .card-emoji {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-name {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-gold-dark);
            display: inline-block;
            padding-bottom: 0.5rem;
        }
        .main-fortune {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }
        .advice-box {
            background: rgba(212, 175, 55, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            text-align: left;
        }
        .lucky-elements {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .lucky-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }
        .lucky-label { font-size: 0.75rem; color: #666; }
        .lucky-value { font-weight: 700; color: var(--color-crimson); }

        /* Year Fortunes Styles */
        .year-fortunes {
            margin-top: 2.5rem;
            text-align: left;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 1.5rem;
        }
        .year-fortune-title {
            font-size: 1.1rem;
            color: var(--color-gold-dark);
            margin-bottom: 1rem;
            text-align: center;
        }
        .year-fortune-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .year-item {
            background: rgba(0, 0, 0, 0.03);
            padding: 0.8rem;
            border-radius: 6px;
            border-left: 3px solid var(--color-gold);
        }
        .year-label {
            font-weight: 700;
            color: var(--color-crimson);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            display: block;
        }
        .year-text {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #444;
        }

        /* MoodTracker Styles */
        .mood-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            margin-top: 2rem;
            text-align: center;
        }
        .mood-title {
            color: var(--color-gold);
            margin-bottom: 1.5rem;
        }
        .mood-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            margin-bottom: 2rem;
            width: 100%;
        }
        .mood-chip {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1rem 0.5rem;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            animation: float 3s ease-in-out infinite;
            animation-delay: calc(var(--index) * 0.1s);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .mood-chip:hover {
            transform: translateY(-8px) scale(1.05) !important;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        .mood-chip.selected {
            background: white;
            border-color: currentColor;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.15);
            transform: scale(1.1) !important;
            animation: selectedPulse 0.5s ease-out;
        }
        .mood-chip.selected::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 16px;
            border: 2px solid currentColor;
            animation: sonar 1.5s ease-out infinite;
        }
        @keyframes sonar {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        @keyframes selectedPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1.1); }
        }
        .mood-chip-icon {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }
        .mood-chip.selected .mood-chip-icon {
            animation: iconShake 0.5s ease-in-out infinite alternate;
        }
        @keyframes iconShake {
            from { transform: rotate(-10deg) scale(1.2); }
            to { transform: rotate(10deg) scale(1.2); }
        }
        .mood-chip-label {
            font-size: 0.8rem;
            font-weight: 700;
            opacity: 0.8;
        }

        /* Food Recommendation Styles */
        .recommendation-box {
            background: rgba(212, 175, 55, 0.1);
            border: 1px dashed var(--color-gold);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeIn 0.5s ease-in;
        }
        .recommend-title {
            color: var(--color-gold);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .recommend-context {
            font-size: 0.85rem;
            color: #aaa;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem;
            border-radius: 4px;
        }
        .recommend-food {
            font-size: 1.2rem;
            color: var(--color-gold);
            font-weight: 700;
        }
        .recommend-reason {
            font-size: 0.9rem;
            color: #ccc;
        }
        .store-search-btn {
            margin-top: 0.5rem;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            padding: 0.6rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: all 0.3s;
        }
        .store-search-btn:hover {
            background: var(--color-gold);
            color: var(--color-ink-black);
        }

        /* Lotto Styles */
        .lotto-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px dashed var(--color-gold-dark);
        }
        .lotto-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: var(--color-gold-dark);
        }
        .lotto-numbers {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .lotto-ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        .ball-0 { background-color: #fbc400; } /* 1-10 */
        .ball-1 { background-color: #69c8f2; } /* 11-20 */
        .ball-2 { background-color: #ff7272; } /* 21-30 */
        .ball-3 { background-color: #aaa; }    /* 31-40 */
        .ball-4 { background-color: #b0d840; } /* 41-45 */

        .refresh-btn {
            background: none;
            border: 1px solid var(--color-gold-dark);
            color: var(--color-gold-dark);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .zodiac-grid { grid-template-columns: repeat(3, 1fr); }
            .lucky-elements { grid-template-columns: 1fr; }
            .header-title { font-size: 2.2rem; }
            .mood-selector { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
